<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>アレルギー情報</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            background-color: #f4f6f8;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            background-color: #ffffff;
            padding: 1.5rem;
            max-width: 800px;
            width: 95%;
            border: 1px solid #ddd;
            border-radius: 0.5rem;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
            margin-top: 1.5rem;
        }

        h2 {
            text-align: center;
            font-size: 1.5rem;
            color: #333333;
            margin-bottom: 1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
            table-layout: fixed; /* テーブルレイアウトを固定 */
        }

        th, td {
            border: 1px solid #dee2e6;
            padding: 0.6rem 0.5rem;
            text-align: center;
            vertical-align: middle; /* ボタンとテキストを中央揃えにする */
        }

        th {
            background-color: #f1f3f5;
            font-weight: bold;
            color: #333;
            white-space: nowrap; /* ヘッダーの改行を防ぐ */
        }

        /* アレルギー名の列のスタイル */
        td:nth-child(1) {
            word-break: break-word; /* 長い単語を折り返す */
        }

        .status-ok, .status-low {
            color: #28a745; /* 落ち着いた緑, 旧: #4fd64f */
            font-weight: bold;
        }

        .status-ng, .status-high {
            color: #d9534f; /* やや暗めの赤 */
            font-weight: bold;
        }

        .status-uncertain {
            color: #f0ad4e; /* 見やすい黄色 */
            font-weight: bold;
        }

        .status-default {
            font-weight: bold;
        }

        /* 追記ボタン(あり)のスタイル (変更なし) */
        .btn-tsuiki {
            display: inline-block; /* aタグでもボタンのように振る舞うようにする */
            padding: 0.4rem 1rem;
            border: 2px solid #007bff;
            background-color: white;
            color: #007bff;
            border-radius: 0.4rem;
            font-size: 0.9rem;
            font-weight: bold; /* 文字を太くする */
            text-decoration: none; /* aタグの下線を消す */
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }

        /* 追記ボタン(buttonタグ)の改行を禁止 */
        button.btn-tsuiki {
            white-space: nowrap;
        }

        .btn-tsuiki:hover,
        .btn-tsuiki.active {
            background-color: #007bff;
            color: white !important; /* ホバー時の文字色を確実に白にする */
        }

        /* アレルゲン名ボタンの新しいスタイル */
        .allergen-name-button {
            display: block;
            width: 100%;
            padding: 0.5rem;
            font-size: 0.9rem;
            font-weight: 700;
            border-radius: 0.5rem;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-decoration: none;
            transition: all 0.2s ease-in-out;
            border: 2px solid;
            box-sizing: border-box;
        }

        .allergen-name-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* 通常のアレルゲンボタンの色 */
        .allergen-name-button {
            background-color: white;
            color: #007bff;
            border-color: #007bff;
        }

        .allergen-name-button:hover {
            background-color: #007bff;
            color: white;
        }

        /* グループアレルゲンボタンの色 */
        .allergen-name-button.group {
            background-color: white;
            color: #28a745;
            border-color: #28a745;
        }

        .allergen-name-button.group:hover {
            background-color: #28a745;
            color: white;
        }

        .button-container {
            text-align: center;
            margin-bottom: 1rem;
        }

        .btn-emergency {
            display: inline-block;
            padding: 0.6rem 1.2rem;
            background-color: #d9534f;
            color: white;
            border: 1px solid black;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            -webkit-appearance: none; /* Remove default iOS styles */
            appearance: none;
        }

        .btn-emergency:hover {
            background-color: #c9302c;
        }

        .contam-explanation {
            font-size: 0.9rem;
            color: #d9534f;
            margin-top: 1rem;
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .extra-notes-row {
            display: none;
            background-color: #f9f9f9;
        }

        .extra-notes-cell {
            text-align: left;
            padding: 0.8rem;
            font-size: 0.9rem;
            color: #555;
        }

        @media (max-width: 576px) {
            th, td {
                font-size: 0.85rem;
                padding: 0.5rem;
            }

            th {
                padding-left: 0.2rem;
                padding-right: 0.2rem;
            }

            h2 {
                font-size: 1.3rem;
            }

            .btn-tsuiki {
                font-size: 0.8rem;
                padding: 0.3rem 0.6rem;
            }

            /* スマホ表示時の列幅を指定 */
            th:nth-child(1), td:nth-child(1) { width: 34%; } /* アレルギー */
            th:nth-child(2), td:nth-child(2) { width: 19%; } /* コンタミ */
            th:nth-child(3), td:nth-child(3) { width: 28%; } /* 重反応リスク */
            th:nth-child(4), td:nth-child(4) { width: 19%; } /* 追記 */
        }
    </style>

    <script>
        function toggleExtraNotes(index) {
            const row = document.getElementById("extra-notes-row" + index);
            const btn = document.getElementById("toggle-btn-" + index);
            if (row && btn) {
                const isVisible = row.style.display !== "none";
                row.style.display = isVisible ? "none" : "table-row";
                btn.classList.toggle("active", !isVisible);
            }
        }

        function adjustFontSizes() {
            const buttons = document.querySelectorAll('.allergen-name-button');
            const minFontSizeRem = 0.6;
            const defaultFontSizeRem = 0.9;

            buttons.forEach(button => {
                button.style.fontSize = defaultFontSizeRem + 'rem';
                let currentFontSizeRem = defaultFontSizeRem;
                if (button.clientWidth > 0) {
                    while (button.scrollWidth > button.clientWidth && currentFontSizeRem > minFontSizeRem) {
                        currentFontSizeRem -= 0.05;
                        button.style.fontSize = currentFontSizeRem + 'rem';
                    }
                }
            });
        }

        window.onload = function () {
            const rows = document.querySelectorAll(".extra-notes-row");
            rows.forEach(row => row.style.display = "none");
            adjustFontSizes();
        };
        window.addEventListener('resize', adjustFontSizes);
    </script>
</head>
<body>

<div class="container">

    <h2 th:text="${username} + ' さんのアレルギー'">〇〇さんのアレルギー</h2>

    <div class="button-container">
        <form th:action="@{/data/show/emergency/{uid}(uid=${uid})}" method="get">
            <input type="submit" class="btn-emergency" value="緊急時対応">
        </form>
    </div>

    <p class="contam-explanation">※コンタミ (コンタミネーション) …調理器具や調理工程の共有により、メニュー自体に含まれていないアレルギー物質が意図せず微量混入すること</p>

    <table>
        <thead>
            <tr>
                <th>アレルギー</th>
                <th>コンタミ</th>
                <th>重反応リスク</th>
                <th>追記</th>
            </tr>
        </thead>
        <tbody>
            <th:block th:each="reaction, iterStat : ${reactions}">
                <tr>
                    <td>
                        <a th:href="@{/data/show/food/{reactionid}(reactionid=${reaction.reactionid})}"
                           class="allergen-name-button"
                           th:classappend="${reaction.extraNotes != null and #strings.contains(reaction.extraNotes, '具体的なアレルゲン:')} ? 'group' : ''">
                            <span th:text="${reaction.allergenName}"></span>
                        </a>
                    </td>
                    <td th:switch="${reaction.contamination}">
                        <span th:case="1" class="status-ok">可</span>
                        <span th:case="2" class="status-ng">否</span>
                        <span th:case="0" class="status-default">不明</span>
                        <span th:case="9" class="status-uncertain">微妙</span>
                    </td>
                    <td th:switch="${reaction.anaRisk}">
                        <span th:case="1" class="status-high">高い</span>
                        <span th:case="2" class="status-low">低い</span>
                        <span th:case="0" class="status-default">不明</span>
                        <span th:case="9" class="status-uncertain">微妙</span>
                    </td>
                    <td>
                        <button th:if="${reaction.extraNotes != null and !reaction.extraNotes.isEmpty()}"
                                th:id="'toggle-btn-' + ${iterStat.index}"
                                class="btn-tsuiki"
                                th:text="'あり'"
                                th:onclick="|toggleExtraNotes(${iterStat.index})|">
                        </button>
                        <span th:if="${reaction.extraNotes == null or reaction.extraNotes.isEmpty()}">なし</span>
                    </td>
                </tr>
                <tr th:if="${reaction.extraNotes != null and !reaction.extraNotes.isEmpty()}"
                    th:id="'extra-notes-row' + ${iterStat.index}"
                    class="extra-notes-row">
                    <td colspan="4" class="extra-notes-cell">
                        <div th:text="${reaction.allergenName} + 'に関する特記事項'" style="font-weight: bold; font-size: 0.95rem; color: #444; margin-bottom: 0.5rem;"></div>
                        <div th:utext="${reaction.extraNotes}" style="font-size: 0.9rem; line-height: 1.6;"></div>
                    </td>
                </tr>
            </th:block>
        </tbody>
    </table>

</div>

</body>
</html>
